services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ai-pqrs-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_pqrs_triage
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
